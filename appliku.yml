build_settings:
  build_image: dockerfile
  dockerfile_path: Dockerfile
  dockerfile_context_path: .
  container_port: 8000
  environment_variables:
    - name: DEBUG
      value: "false"
    - name: ALLOWED_HOSTS
      from_domains: true
    - name: SECRET_KEY
      source: manual

services:
  web:
    command: sh -c 'python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000}'
    scale: 1

  release:
    command: sh -c 'python manage.py migrate'
