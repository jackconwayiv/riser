build_settings:
  build_image: custom
  dockerfile_path: Dockerfile
  dockerfile_context_path: .
  container_port: 8000
  environment_variables:
    - name: DEBUG
      value: "false"
    - name: ALLOWED_HOSTS
      from_domains: true
    - name: SECRET_KEY
      source: manual

services:
  web:
    command: gunicorn --chdir backend config.wsgi:application --bind 0.0.0.0:$PORT
    scale: 1

  release:
    command: python backend/manage.py migrate
